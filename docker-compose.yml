services:
  web:
    build: .
    container_name: chicago-budget-rag
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - FORCE_REINDEX=${FORCE_REINDEX:-0}
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-none}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      - OPENAI_EMBED_MODEL=${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3.1}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - BEDROCK_CHAT_MODEL=${BEDROCK_CHAT_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}
      - BEDROCK_EMBED_MODEL=${BEDROCK_EMBED_MODEL:-amazon.titan-embed-text-v2:0}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - RAG_BM25_WEIGHT=${RAG_BM25_WEIGHT:-0.85}
      - RAG_VECTOR_WEIGHT=${RAG_VECTOR_WEIGHT:-0.15}
      - RAG_TOC_PENALTY=${RAG_TOC_PENALTY:-0.35}
      - RAG_SUPPRESS_TOC=${RAG_SUPPRESS_TOC:-true}
      - RAG_CANDIDATE_MULTIPLIER=${RAG_CANDIDATE_MULTIPLIER:-8}
      - RAG_RERANKER=${RAG_RERANKER:-auto}
      - RAG_RERANK_CANDIDATES=${RAG_RERANK_CANDIDATES:-30}
      - RAG_RERANKER_MODEL=${RAG_RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
    volumes:
      - rag_index:/app/data/index

volumes:
  rag_index:
